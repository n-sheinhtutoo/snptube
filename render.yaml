services:
  - type: web
    name: ytdownloader-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DOWNLOAD_DIR
        value: /tmp/ytdownloader
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: "*"
