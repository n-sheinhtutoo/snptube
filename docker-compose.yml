services:
  api:
    build: .
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - PORT=${PORT:-8000}
      - DOWNLOAD_DIR=/app/downloads
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=*
    volumes:
      - downloads:/app/downloads
    restart: unless-stopped

volumes:
  downloads:
